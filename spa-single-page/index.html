<!doctype html>
<html lang="en">
  <head>
    <!--
      SPA VIEWER INTEGRATION

      This page no longer owns any local file-selection UI.
      The host application is expected to navigate here with a backend object path in the URL.

      Supported query parameters:
      - `?file=<backend-object-key>`  -> primary contract used by the shared viewer runtime
      - `?path=<backend-object-key>`  -> normalized to `file` below for host integrations
      - `?key=<backend-object-key>`   -> normalized to `file` below for host integrations
      - `?filePath=<backend-object-key>` -> normalized to `file` below for host integrations
      - A host page may also expose the selected backend object path in a global `file` variable

      Important:
      - Pass the backend object key/path, not a full browser URL.
      - Shared viewer assets are loaded from `spa/css`, `spa/js`, and `spa/config`
      - The shared runtime reads `?file=` inside `spa/js/app-viewer.js`
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HDF Viewer</title>

    <!-- Shared viewer styles from the local SPA asset folder. -->
  <link rel="stylesheet" href="style.css" />
        
  </head>
  <body class="spa-layout">
    <!--
      Optional host selector mount point.
      Remove this comment and place your own selector UI here only if this page should render it.
      Example:
      <button type="button" data-file-key="hdf5/sample.hdf5">Open sample</button>
    -->
    <!-- Optional host area. Company page controls like file list / radio buttons can sit here. -->
    <div id="host-selector"></div>
    <!--
      SHARED VIEWER SHELL
      - This markup is rendered by the shared viewer runtime.
      - If you need to change the tree/metadata/display UI, edit files under:
        `spa/css/` and `spa/js/`
    -->
    <!-- Main viewer root. The JS app reads and updates everything inside this block. -->
    <div id="viewer-app" class="viewer-page sidebar-collapsed">
      <!-- Left side: file tree and metadata panel. -->
      <aside id="viewer-sidebar" class="viewer-sidebar">
        <div id="sidebar-header" class="sidebar-top">
          <div class="sidebar-top-row">
            <div class="sidebar-title">HDF Viewer</div>
            <button
              id="sidebar-close-btn"
              class="sidebar-close-btn"
              type="button"
              aria-label="Close sidebar"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 18 18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <line x1="4" y1="4" x2="14" y2="14"></line>
                <line x1="14" y1="4" x2="4" y2="14"></line>
              </svg>
            </button>
          </div>
        </div>

        <div id="tree-panel" class="sidebar-section">
          <div class="section-label">Structure</div>
          <div class="sidebar-tree">
            <ul id="tree-list" class="tree-root"></ul>
          </div>
          <div id="tree-status" class="tree-status" aria-live="polite">
            Waiting for file query parameter.
          </div>
        </div>

        <!-- SPA-only metadata mount: the runtime now renders metadata below the tree. -->
        <div id="metadata-panel" class="sidebar-section">
          <div class="section-label">Metadata</div>
          <div class="sidebar-panel-scroll sidebar-metadata-scroll">
            <div class="sidebar-metadata-panel">
              <div class="panel-state">
                <div class="state-text">
                  Select an item from the tree to view its metadata.
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Right side: top bar, tabs, charts, table preview, and dataset view. -->
      <section id="viewer-main" class="viewer-main">
        <div id="viewer-topbar" class="viewer-topbar">
          <div class="topbar-left">
            <button
              id="sidebar-toggle-btn"
              class="sidebar-toggle-btn"
              type="button"
              aria-label="Toggle sidebar"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <line x1="3" y1="5" x2="17" y2="5"></line>
                <line x1="3" y1="10" x2="17" y2="10"></line>
                <line x1="3" y1="15" x2="17" y2="15"></line>
              </svg>
            </button>
            <div class="topbar-path">
              <div class="breadcrumb-label">File location</div>
              <div id="breadcrumb-path" class="breadcrumb">
                <span id="breadcrumb-file" class="crumb active"
                  >No file selected</span
                >
              </div>
            </div>
          </div>

          <div class="topbar-right">
            <button id="viewer-back-btn" class="ghost-btn" type="button">
              <svg
                class="btn-icon"
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="10 2 4 8 10 14"></polyline>
              </svg>
              <span class="btn-label">Back to files</span>
            </button>
            <button
              id="viewer-fullscreen-btn"
              class="ghost-btn"
              type="button"
              title="Toggle fullscreen"
            >
              <svg
                class="btn-icon"
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M2 6V2h4M14 6V2h-4M2 10v4h4M14 10v4h-4"></path>
              </svg>
              <span class="btn-label">Fullscreen</span>
            </button>
          </div>
        </div>

        <div id="viewer-subbar" class="viewer-subbar" hidden>
          <div id="subbar-tabs" class="subbar-tabs"></div>
          <div id="subbar-actions" class="subbar-actions"></div>
        </div>

        <!-- Main content area. Preview and data UI gets rendered here. -->
        <div id="viewer-panel" class="viewer-panel">
          <div id="display-pane" hidden></div>
          <!-- Kept for DOM compatibility with shared modules; SPA keeps this hidden. -->
          <div id="inspect-pane" hidden></div>
          <div
            id="display-status"
            class="panel-status info"
            role="status"
            aria-live="polite"
          ></div>
          <div
            id="inspect-status"
            class="panel-status info"
            role="status"
            aria-live="polite"
            hidden
          ></div>
        </div>
      </section>
    </div>

    <div
      id="sidebar-backdrop"
      class="sidebar-backdrop"
      style="display: none"
    ></div>
    <!-- Small bottom status area. Boot errors and loading messages show here. -->
    <div
      id="global-status"
      class="panel-status info"
      role="status"
      aria-live="polite"
    >
      Viewer shell loaded. Waiting for file query parameter from host UI.
    </div>

 <script src="script.js"></script>
 </body>
</html>
