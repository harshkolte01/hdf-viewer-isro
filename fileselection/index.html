<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Selection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="navbar-title">RESULT++ PROJECT REPOSITORY</div>
    </nav>

    <section class="file-browser" aria-label="File browser">
      <div class="toolbar">
        <button id="rootBtn" type="button">Root</button>
        <span id="currentPath">/</span>
      </div>

      <div id="breadcrumbs" class="breadcrumbs"></div>
      <div id="items" class="items"></div>
      <p id="status" class="status"></p>
    </section>
  </header>

  <script src="script.js"></script>
  <script>
    let file = "";

    document.addEventListener("change", function (event) {
      const target = event.target;
      if (target && target.matches('input[name="selectedFile"]')) {
        file = target.value;
        console.log(file);
      }
    });
  </script>
</body>
</html>
