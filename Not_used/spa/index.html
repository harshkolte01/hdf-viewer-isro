<!doctype html>
<html lang="en">
  <head>
    <!--
      SPA VIEWER INTEGRATION

      This page no longer owns any local file-selection UI.
      The host application is expected to navigate here with a backend object path in the URL.

      Supported query parameters:
      - `?file=<backend-object-key>`  -> primary contract used by the shared viewer runtime
      - `?path=<backend-object-key>`  -> normalized to `file` below for host integrations
      - `?key=<backend-object-key>`   -> normalized to `file` below for host integrations
      - `?filePath=<backend-object-key>` -> normalized to `file` below for host integrations
      - A host page may also expose the selected backend object path in a global `file` variable

      Important:
      - Pass the backend object key/path, not a full browser URL.
      - Shared viewer assets are loaded from `spa/css`, `spa/js`, and `spa/config`
      - The shared runtime reads `?file=` inside `spa/js/app-viewer.js`
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HDF Viewer</title>

    <!-- Shared viewer styles from the local SPA asset folder. -->
    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="./css/home.css" />
    <link rel="stylesheet" href="./css/viewer.css" />
    <link rel="stylesheet" href="./css/viewer-panel.css" />
    <link rel="stylesheet" href="./css/components/tree.css" />
    <link rel="stylesheet" href="./css/components/table.css" />
    <link rel="stylesheet" href="./css/components/charts.css" />

    <style>
      /* Minimal SPA-only wrapper styles. Viewer styling itself stays in `spa/css/...`. */
      body.spa-layout {
        min-height: 100vh;
        min-height: 100dvh;
        background:
          radial-gradient(
            circle at top left,
            rgba(37, 99, 235, 0.12),
            transparent 26%
          ),
          radial-gradient(
            circle at top right,
            rgba(56, 189, 248, 0.1),
            transparent 22%
          ),
          var(--bg-primary);
      }

      body.spa-layout #viewer-app.viewer-page {
        min-height: 100vh;
        min-height: 100dvh;
        height: 100vh;
        height: 100dvh;
        margin-top: 0;
      }

      #global-status {
        margin: 0;
        border-left: 0;
        border-right: 0;
        border-bottom: 0;
        border-radius: 0;
      }

      /*
        Optional host UI mount point.
        It stays hidden until the host app actually injects its own selector/content here.
      */
      #host-selector:empty {
        display: none;
      }
    </style>
  </head>
  <body class="spa-layout">
    <!--
      Optional host selector mount point.
      Remove this comment and place your own selector UI here only if this page should render it.
      Example:
      <button type="button" data-file-key="hdf5/sample.hdf5">Open sample</button>
    -->
    <div id="host-selector"></div>
    <!--
      SHARED VIEWER SHELL
      - This markup is rendered by the shared viewer runtime.
      - If you need to change the tree/metadata/display UI, edit files under:
        `spa/css/` and `spa/js/`
    -->
    <div id="viewer-app" class="viewer-page sidebar-collapsed">
      <aside id="viewer-sidebar" class="viewer-sidebar">
        <div id="sidebar-header" class="sidebar-top">
          <div class="sidebar-top-row">
            <div class="sidebar-title">HDF Viewer</div>
            <button
              id="sidebar-close-btn"
              class="sidebar-close-btn"
              type="button"
              aria-label="Close sidebar"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 18 18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <line x1="4" y1="4" x2="14" y2="14"></line>
                <line x1="14" y1="4" x2="4" y2="14"></line>
              </svg>
            </button>
          </div>
        </div>

        <div id="tree-panel" class="sidebar-section">
          <div class="section-label">Structure</div>
          <div class="sidebar-tree">
            <ul id="tree-list" class="tree-root"></ul>
          </div>
          <div id="tree-status" class="tree-status" aria-live="polite">
            Waiting for file query parameter.
          </div>
        </div>

        <!-- SPA-only metadata mount: the runtime now renders metadata below the tree. -->
        <div id="metadata-panel" class="sidebar-section">
          <div class="section-label">Metadata</div>
          <div class="sidebar-panel-scroll sidebar-metadata-scroll">
            <div class="sidebar-metadata-panel">
              <div class="panel-state">
                <div class="state-text">
                  Select an item from the tree to view its metadata.
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <section id="viewer-main" class="viewer-main">
        <div id="viewer-topbar" class="viewer-topbar">
          <div class="topbar-left">
            <button
              id="sidebar-toggle-btn"
              class="sidebar-toggle-btn"
              type="button"
              aria-label="Toggle sidebar"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <line x1="3" y1="5" x2="17" y2="5"></line>
                <line x1="3" y1="10" x2="17" y2="10"></line>
                <line x1="3" y1="15" x2="17" y2="15"></line>
              </svg>
            </button>
            <div class="topbar-path">
              <div class="breadcrumb-label">File location</div>
              <div id="breadcrumb-path" class="breadcrumb">
                <span id="breadcrumb-file" class="crumb active"
                  >No file selected</span
                >
              </div>
            </div>
          </div>

          <div class="topbar-right">
            <button id="viewer-back-btn" class="ghost-btn" type="button">
              <svg
                class="btn-icon"
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="10 2 4 8 10 14"></polyline>
              </svg>
              <span class="btn-label">Back to files</span>
            </button>
            <button
              id="viewer-fullscreen-btn"
              class="ghost-btn"
              type="button"
              title="Toggle fullscreen"
            >
              <svg
                class="btn-icon"
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M2 6V2h4M14 6V2h-4M2 10v4h4M14 10v4h-4"></path>
              </svg>
              <span class="btn-label">Fullscreen</span>
            </button>
          </div>
        </div>

        <div id="viewer-subbar" class="viewer-subbar" hidden>
          <div id="subbar-tabs" class="subbar-tabs"></div>
          <div id="subbar-actions" class="subbar-actions"></div>
        </div>

        <div id="viewer-panel" class="viewer-panel">
          <div id="display-pane" hidden></div>
          <!-- Kept for DOM compatibility with shared modules; SPA keeps this hidden. -->
          <div id="inspect-pane" hidden></div>
          <div
            id="display-status"
            class="panel-status info"
            role="status"
            aria-live="polite"
          ></div>
          <div
            id="inspect-status"
            class="panel-status info"
            role="status"
            aria-live="polite"
            hidden
          ></div>
        </div>
      </section>
    </div>

    <div
      id="sidebar-backdrop"
      class="sidebar-backdrop"
      style="display: none"
    ></div>
    <div
      id="global-status"
      class="panel-status info"
      role="status"
      aria-live="polite"
    >
      Viewer shell loaded. Waiting for file query parameter from host UI.
    </div>

    <!-- Shared runtime config from the local SPA asset folder. -->
    <script src="./config/runtime-config.js"></script>

    <!--
      HOST PARAM NORMALIZER
      - Keeps the shared viewer runtime unchanged.
      - If the host UI passes `path`, `key`, or `filePath`, this normalizes it to `file`
        before `spa/js/app-viewer.js` boots.
      - If the host page already stores the selected path in a global `file` variable,
        this bridge reads that too.
      - If your host UI already sends `?file=<backend-object-key>`, you do not need to change this.
    -->
    <script>
      (function hostFileBridge() {
        function normalizeFileKey(value) {
          if (typeof value !== "string") {
            return "";
          }

          return value.trim();
        }

        function readHostFileVariable() {
          if (typeof file !== "undefined") {
            return normalizeFileKey(file);
          }

          return normalizeFileKey(window.file);
        }

        function setFileParam(fileKey) {
          var params = new URLSearchParams(window.location.search);
          params.set("file", fileKey);

          if (typeof window.history.replaceState === "function") {
            window.history.replaceState(
              {},
              "",
              window.location.pathname +
                "?" +
                params.toString() +
                window.location.hash,
            );
          }
        }

        function normalizeIncomingFileParam() {
          var params = new URLSearchParams(window.location.search);
          if (params.get("file")) {
            return;
          }

          var externalKey =
            params.get("path") || params.get("key") || params.get("filePath");

          if (!externalKey) {
            externalKey = readHostFileVariable();
          }

          if (!externalKey) {
            return;
          }

          setFileParam(externalKey);
        }

        function openFileFromHostUi(fileKey) {
          if (!fileKey) {
            return;
          }

          setFileParam(fileKey);

          if (
            window.actions &&
            typeof window.actions.openViewer === "function"
          ) {
            window.actions.openViewer({ key: fileKey, etag: null });

            if (typeof window.actions.loadFiles === "function") {
              window.actions.loadFiles();
            }
          }
        }

        document.addEventListener("click", function (event) {
          var button = event.target.closest("[data-file-key]");
          if (!button) {
            return;
          }

          openFileFromHostUi(button.getAttribute("data-file-key") || "");
        });

        window.openFileFromHostUi = openFileFromHostUi;
        window.syncHostFileVariable = function syncHostFileVariable() {
          var hostFileKey = readHostFileVariable();
          if (!hostFileKey) {
            return;
          }

          openFileFromHostUi(hostFileKey);
        };

        normalizeIncomingFileParam();
      })();
    </script>

    <!--
      SHARED VIEWER RUNTIME SCRIPTS
      - Loaded from `spa/js/...`
      - Script order matters.
      - Deep-link opening is handled by `spa/js/app-viewer.js`
    -->
       

    <script src="./js/core/namespace.js" defer></script>
    <script src="./js/core/config.js" defer></script>
    <script src="./js/core/domRefs.js" defer></script>

    <script src="./js/utils/format.js" defer></script>
    <script src="./js/utils/lru.js" defer></script>
    <script src="./js/utils/export.js" defer></script>

    <script src="./js/api/client.js" defer></script>
    <script src="./js/api/contracts.js" defer></script>
    <script src="./js/api/hdf5Service.js" defer></script>

    <script src="./js/state/store.js" defer></script>
    <script src="./js/state/reducers/utils.js" defer></script>
    <script src="./js/state/reducers/filesActions.js" defer></script>
    <script src="./js/state/reducers/treeActions.js" defer></script>
    <script src="./js/state/reducers/viewActions.js" defer></script>
    <script src="./js/state/reducers/displayConfigActions.js" defer></script>
    <script src="./js/state/reducers/dataActions.js" defer></script>
    <script src="./js/state/reducers/compareActions.js" defer></script>
    <script src="./js/state/reducers.js" defer></script>

    <script src="./js/components/viewerPanel/shared.js" defer></script>
    <script src="./js/components/viewerPanel/render/config.js" defer></script>
    <script src="./js/components/viewerPanel/render/previews.js" defer></script>
    <script src="./js/components/viewerPanel/render/dimensionControls.js" defer></script>
    <script src="./js/components/viewerPanel/render/sections.js" defer></script>
    <script src="./js/components/viewerPanel/render.js" defer></script>
    <script src="./js/components/viewerPanel/runtime/common.js" defer></script>
    <script src="./js/components/viewerPanel/runtime/matrixRuntime.js" defer></script>
    <script src="./js/components/viewerPanel/runtime/lineRuntime.js" defer></script>
    <script src="./js/components/viewerPanel/runtime/heatmapRuntime.js" defer></script>
    <script src="./js/components/viewerPanel/runtime/bindEvents.js" defer></script>
    <script src="./js/components/viewerPanel/runtime.js" defer></script>
    <script src="./js/components/viewerPanel.js" defer></script>

    <script src="./js/components/sidebarTree.js" defer></script>
    <script src="./js/views/viewerView.js" defer></script>

    <script src="./js/app-viewer.js" defer></script>
  </body>
</html>
